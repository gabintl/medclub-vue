<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        
        <link rel="icon" href="src/assets/favicon.ico">
        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClubMed</title>
        <meta name="description" content="Découvrez nos Clubs et Villages de Vacances exclusifs. Réservez votre séjour inoubliable : ski, soleil, famille et formules tout inclus au meilleur prix.">
        
        <link rel="preload" as="image" href="/hero-home.webp" fetchpriority="high">

        <style>
            body { margin: 0; padding: 0; font-family: sans-serif; }
            
            /* Le conteneur qui prend tout l'écran */
            .loading-screen {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background-color: #ffffff;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            /* Animation du logo (Battement de coeur) */
            .loading-logo {
                width: 80px; /* Ajuste la taille selon ton icône */
                margin-bottom: 30px;
                animation: pulse 2s infinite ease-in-out;
            }

            /* Le cercle qui tourne (Spinner) */
            .loading-spinner {
                width: 40px;
                height: 40px;
                border: 4px solid #f3f3f3;
                border-top: 4px solid #408c99; /* Couleur ClubMed */
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            /* Texte de chargement optionnel */
            .loading-text {
                margin-top: 15px;
                color: #408c99;
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 1px;
                text-transform: uppercase;
            }

            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }

            @keyframes pulse {
                0% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.1); opacity: 0.8; }
                100% { transform: scale(1); opacity: 1; }
            }
        </style>
    </head>
    <body>
        
        <div id="app">
            <div class="loading-screen">
                <img src="src/assets/favicon.ico" alt="Club Med" class="loading-logo">
                
                <div class="loading-spinner"></div>
                <div class="loading-text">Chargement...</div>
            </div>
        </div>

        <script>
            var botmanWidget = {
                chatServer: 'http://51.83.36.122:8039/botman', 
                frameEndpoint: 'http://51.83.36.122:8039/botman/chat',
                title: 'Assistant ClubMed',
                introMessage: "Bonjour ! Je suis l'assistant virtuel du ClubMed. Comment puis-je vous aider ?",
                mainColor: '#408c99', 
                bubbleBackground: '#408c99',
                aboutText: '',
                bubbleAvatarUrl: ''
            };
        </script>
        <script src='https://cdn.jsdelivr.net/npm/botman-web-widget@0/build/js/widget.js' defer></script>
        
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
